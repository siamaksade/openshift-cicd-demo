apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-update-deployment
spec:
  description: Update deployment manifests with new image digest
  params:
    - name: GIT_REPOSITORY
      type: string
      description: The git repository URL
    - name: GIT_USERNAME
      type: string
      description: Git username
    - name: GIT_PASSWORD
      type: string
      description: Git password
    - name: CURRENT_IMAGE
      type: string
      description: Current image reference
    - name: NEW_IMAGE
      type: string
      description: New image reference (without digest)
    - name: NEW_DIGEST
      type: string
      description: New image digest
    - name: KUSTOMIZATION_PATH
      type: string
      description: Path to kustomization directory (e.g., environments/dev)
  workspaces:
    - name: workspace
      description: Workspace containing the source
  steps:
    - name: update-manifests
      image: quay.io/siamaksade/python-oc:latest
      script: |
        #!/usr/bin/env python3

        import subprocess
        import os
        import sys
        import re

        git_repo = "$(params.GIT_REPOSITORY)"
        git_user = "$(params.GIT_USERNAME)"
        git_pass = "$(params.GIT_PASSWORD)"
        current_image = "$(params.CURRENT_IMAGE)"
        new_image = "$(params.NEW_IMAGE)"
        new_digest = "$(params.NEW_DIGEST)"
        kustomization_path = "$(params.KUSTOMIZATION_PATH)"
        workspace = "$(workspaces.workspace.path)"

        # Build the new image reference with digest
        new_image_with_digest = f"{new_image}@{new_digest}"

        # Extract git server URL
        match = re.search(r'https://([^/]+)/(.+)', git_repo)
        if not match:
            print(f"Could not parse git repository URL: {git_repo}")
            sys.exit(1)

        git_host = match.group(1)
        repo_path = match.group(2).rstrip('.git')
        auth_url = f"https://{git_user}:{git_pass}@{git_host}/{repo_path}"

        # Clone the repository
        clone_dir = f"{workspace}/manifests-repo"
        os.makedirs(clone_dir, exist_ok=True)

        print(f"Cloning {git_repo}...")
        subprocess.run(["git", "clone", auth_url, clone_dir], check=True)

        os.chdir(clone_dir)

        # Configure git
        subprocess.run(["git", "config", "user.email", "tekton@pipeline.com"], check=True)
        subprocess.run(["git", "config", "user.name", "Tekton Pipeline"], check=True)

        # Update kustomization.yaml
        kustomization_file = f"{kustomization_path}/kustomization.yaml"

        print(f"Updating {kustomization_file}...")
        print(f"Old image: {current_image}")
        print(f"New image: {new_image_with_digest}")

        # Read the file
        with open(kustomization_file, 'r') as f:
            content = f.read()

        # Replace image reference - handle both with and without digest
        # Pattern matches lines like:
        #   newName: image-registry.openshift-image-registry.svc:5000/demo-cicd/spring-petclinic
        #   newTag: latest
        # OR
        #   - image-registry.openshift-image-registry.svc:5000/demo-cicd/spring-petclinic:latest
        #   - image-registry.openshift-image-registry.svc:5000/demo-cicd/spring-petclinic@sha256:...

        # Check if using images list format or newName/newTag format
        if 'newName:' in content and 'newTag:' in content:
            # Replace newName and newTag with newName and digest
            content = re.sub(
                r'(newName:\s*).*',
                f'\\1{new_image}',
                content
            )
            # Remove newTag line if exists
            content = re.sub(r'\s*newTag:.*\n', '', content)
            # Add digest after newName
            content = re.sub(
                r'(newName:\s*.*)\n',
                f'\\1\n    digest: {new_digest}\n',
                content
            )
        else:
            # Simple replacement in images list
            content = re.sub(
                r'- ' + re.escape(current_image) + r'(:latest|@sha256:[a-f0-9]+)?',
                f'- {new_image_with_digest}',
                content
            )
            content = re.sub(
                r'- ' + re.escape(new_image) + r'(:latest|@sha256:[a-f0-9]+)?',
                f'- {new_image_with_digest}',
                content
            )

        # Write back
        with open(kustomization_file, 'w') as f:
            f.write(content)

        print("Updated kustomization.yaml:")
        subprocess.run(["cat", kustomization_file])

        # Commit and push
        subprocess.run(["git", "add", kustomization_path], check=True)

        try:
            subprocess.run([
                "git", "commit", "-m",
                f"Update {kustomization_path} with image {new_image_with_digest}"
            ], check=True)
        except subprocess.CalledProcessError:
            print("No changes to commit")
            sys.exit(0)

        print("Pushing changes...")
        subprocess.run(["git", "push", "origin", "main"], check=True)

        print("Successfully updated manifests!")
